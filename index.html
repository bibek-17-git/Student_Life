<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Student Life Manager</title>
<meta name="description" content="All-in-one finance, schedule and reminder manager for university students.">
<meta name="theme-color" content="#2B4C7E">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">
  <!-- Sidebar (desktop) -->
  <nav class="sidebar" id="sidebar">
    <div class="brand">Student<span>Life</span></div>
    <div class="nav-item" data-page="dashboard"><span class="icon">🏠</span> Dashboard</div>
    <div class="nav-item" data-page="finance"><span class="icon">💰</span> Finance</div>
    <div class="nav-item" data-page="schedule"><span class="icon">📅</span> Schedule</div>
    <div class="nav-item" data-page="reminders"><span class="icon">🔔</span> Reminders</div>
    <div class="nav-item" data-page="notes"><span class="icon">📝</span> Notes</div>
    <div class="nav-item" data-page="settings"><span class="icon">⚙️</span> Settings</div>
  </nav>

  <!-- Main content -->
  <main class="main" id="main">
    <div class="topbar">
      <div>
        <h1 id="page-title">Dashboard</h1>
        <div class="date-line" id="date-line"></div>
      </div>
      <button class="icon-btn" id="dark-toggle" title="Toggle dark mode">🌙</button>
    </div>
    <div id="page-content"></div>
  </main>
</div>

<!-- Bottom nav (mobile) -->
<nav class="bottom-nav">
  <div class="nav-row">
    <div class="nav-item" data-page="dashboard"><span class="icon">🏠</span>Home</div>
    <div class="nav-item" data-page="finance"><span class="icon">💰</span>Finance</div>
    <div class="nav-item" data-page="schedule"><span class="icon">📅</span>Schedule</div>
    <div class="nav-item" data-page="reminders"><span class="icon">🔔</span>Alerts</div>
    <div class="nav-item" data-page="notes"><span class="icon">📝</span>Notes</div>
  </div>
</nav>

<div id="toast"></div>

<script src="js/storage.js"></script>
<script src="js/alarm.js"></script>
<script src="js/finance.js"></script>
<script src="js/schedule.js"></script>
<script src="js/reminders.js"></script>
<script src="js/notes.js"></script>
<script src="js/app.js"></script>
</body>
</html>
